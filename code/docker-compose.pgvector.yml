# ──────────────────────────────────────────────────────────────────────────────
# Activation option for ai-search vector storage: PostgreSQL 17 WITH pgvector.
#
# The project's native Windows PostgreSQL 17 does NOT have pgvector available
# (verified: pg_available_extensions has no `vector`), so `CREATE EXTENSION vector`
# fails there. Two routes:
#   A) install pgvector binaries into the existing native PG17, OR
#   B) use this container for dev (it bundles pgvector).
#
# Route B usage:
#   1. Stop the native PostgreSQL (frees port 5432) — or change the port below
#      and DATABASE_URL accordingly.
#   2. docker compose -f docker-compose.pgvector.yml up -d
#   3. Apply schema:  the app's `prisma migrate dev` (creates all tables) THEN
#      psql -f prisma/sql/0001_ai_search.sql  (extension + vector tables + columns).
#   Note: the existing dev DB has only ~8 cellar rows, so starting fresh here is cheap.
# ──────────────────────────────────────────────────────────────────────────────
services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ai_wine_cellar_pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_wine_cellar
    # Host port 5433 to avoid clashing with the native PostgreSQL on 5432.
    # DATABASE_URL therefore points at :5433 for the dev backend.
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data

volumes:
  pgvector_data:
